<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fff;
            color: #0f1419;
        }

        .header {
            padding: 16px;
            background: #1d9bf0;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header img {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: white;
            padding: 2px;
        }

        .header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
        }

        .content {
            padding: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f7f9f9;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 20px;
            font-weight: 800;
            color: #1d9bf0;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            color: #536471;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #1d9bf0;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 999px;
            font-weight: 700;
            font-size: 14px;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1a8cd8;
        }

        .btn-secondary {
            background: #fff;
            color: #1d9bf0;
            border: 1px solid #cfd9de;
            margin-top: 8px;
        }

        .btn-secondary:hover {
            background: #f7f9f9;
        }

        .footer {
            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: #536471;
            border-top: 1px solid #eff3f4;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: #e7f5ed;
            color: #00ba7c;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="icons/icon128.png" alt="Logo">
        <h1>Bookmark Base</h1>
    </div>
    <div class="content">
        <div class="stats">
            <div class="stat-card">
                <span class="stat-value" id="pending-count">0</span>
                <span class="stat-label">Pending Sync</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="update-count">0</span>
                <span class="stat-label">Updates</span>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 16px;">
            <div class="status-badge">
                <span style="width: 6px; height: 6px; background: #00ba7c; border-radius: 50%;"></span>
                Extension Active
            </div>
        </div>

        <button id="open-dashboard" class="btn">Open Archive</button>
        <button id="sync-now" class="btn btn-secondary">Sync Now</button>
    </div>
    <div class="footer">
        v1.1.0 &bull; Bookmark Base Archive Helper
    </div>
    <script src="popup.js"></script>
</body>

</html>
